<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Exambro | SMAN 23 Batam</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bubbles" id="bubble-container"></div>

    <div id="login-area" class="login-box">
        <h2>SMAN 23 BATAM</h2>
        <p class="subtitle">E-EXAM BROWSER</p>
        <input type="password" id="input-pin" placeholder="PIN MASUK" inputmode="numeric">
        <button class="btn-save" onclick="verifikasiMasuk()">MULAI UJIAN</button>
    </div>

    <div id="exam-container">
        <div class="top-bar">
            <div class="status-indicator">
                <span class="dot">●</span> UJIAN BERLANGSUNG
            </div>
            <div class="control-buttons">
                <button class="btn-round btn-blue" onclick="location.reload()">↻</button>
                <button class="btn-round btn-red" onclick="bukaModalKeluar()">✕</button>
            </div>
        </div>
        <iframe id="exam-frame" src="about:blank"></iframe>
    </div>

    <div id="modal-exit">
        <div class="modal-content">
            <h3>Keluar Sistem?</h3>
            <p class="modal-desc">Masukkan PIN Keluar untuk mengakhiri sesi ujian ini.</p>
            <input type="password" id="input-pass-keluar" placeholder="PIN KELUAR" inputmode="numeric">
            <div class="modal-actions">
                <button class="btn-batal" onclick="tutupModalKeluar()">BATAL</button>
                <button class="btn-keluar-final" onclick="verifikasiKeluar()">KELUAR</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="script.js"></script>

    <script>
        // Animasi Gelembung Otomatis
        const container = document.getElementById('bubble-container');
        for (let i = 0; i < 15; i++) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 50 + 15 + 'px';
            bubble.style.width = size;
            bubble.style.height = size;
            bubble.style.left = Math.random() * 100 + '%';
            bubble.style.animationDelay = Math.random() * 8 + 's';
            bubble.style.animationDuration = Math.random() * 7 + 8 + 's';
            container.appendChild(bubble);
        }
    </script>
</body>
</html>
